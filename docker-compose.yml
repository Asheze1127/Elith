# Local development stack: web (Next.js) / api (FastAPI) / db (PostgreSQL + pgvector).
#
# Usage:
#   docker compose up -d db        # start Postgres with pgvector enabled
#   docker compose build api       # build the API image
#   docker compose up -d api       # start the API (curl localhost:8000/health -> 200)
#
# NOTE: the `web` service depends on the web/ Next.js app created in #13 (FE-01).
# Until then `docker compose build web` / `up web` will fail (no web/ source).
# Bring up db/api only for local verification.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: elith
      POSTGRES_PASSWORD: elith
      POSTGRES_DB: elith
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      # Runs on first init only: enables the pgvector extension.
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elith -d elith"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: ../infra/Dockerfile.api
    environment:
      ENVIRONMENT: local
      # Point at the db service on the compose network (not localhost).
      DATABASE_URL: postgresql+psycopg://elith:elith@db:5432/elith
      # Passed through from the host env; empty falls back to the mock provider.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # NOTE: build fails until #13 (FE-01) adds the web/ Next.js app.
  web:
    build:
      context: ./web
      dockerfile: ../infra/Dockerfile.web
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  db-data:
